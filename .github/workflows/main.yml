name: Update Stream Link

on:
  schedule:
    - cron: '*/5 * * * *' # สั่งรันอัตโนมัติทุกๆ 5 นาที
  workflow_dispatch: # เพิ่มปุ่มกดสั่งรันเองแบบ Manual ได้ตามปกติ

jobs:
  update-link:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install cloudscraper

    # 🛠️ จุดแก้ไข: สั่งให้ GitHub สร้างไฟล์ fetch.py ขึ้นมาตรงนี้เลยก่อนกดรัน
    - name: Create Fetch Script
      run: |
        cat << 'EOF' > fetch.py
        import os
        import cloudscraper

        url = "https://ipplaybox.fun/dookeela/ch3hd/chunks.m3u8"

        headers = {
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
            "Accept-Language": "en-US,en;q=0.9",
            "Referer": "https://ipplaybox.fun/",
        }

        try:
            scraper = cloudscraper.create_scraper(
                browser={"browser": "chrome", "platform": "windows", "desktop": True}
            )
            response = scraper.get(url, headers=headers, timeout=15)
            
            if response.status_code == 200 and "#EXTM3U" in response.text:
                raw_content = response.text
                lines = raw_content.split("\n")
                new_lines = []
                base_url = "https://ipplaybox.fun/dookeela/ch3hd/"
                
                for line in lines:
                    t = line.strip()
                    if t and not t.startswith("#"):
                        if ".css" in t:
                            t = t.replace(".css", ".ts")
                        if not t.startswith("http"):
                            t = base_url + t
                    new_lines.append(t)
                    
                processed_content = "\n".join(new_lines)
                
                with open("live.m3u8", "w", encoding="utf-8") as f:
                    f.write(processed_content)
                print("Fetch and Convert Successful!")
            else:
                print(f"Failed to fetch. Status code: {response.status_code}")
        except Exception as e:
            print(f"Error occurred: {e}")
        EOF

    - name: Run Fetch Script
      run: python fetch.py

    - name: Commit and Push if updated
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add live.m3u8
        git commit -m "Update live stream playlist" || exit 0
        git push
