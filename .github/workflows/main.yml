name: Update Stream Link

on:
  schedule:
    - cron: '*/5 * * * *' # สั่งรันอัตโนมัติทุกๆ 5 นาที
  workflow_dispatch: # ปุ่มกดสั่งรันเองแบบ Manual

jobs:
  update-link:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install cloudscraper

    - name: Create Fetch Script
      run: |
        cat << 'EOF' > fetch.py
        import os
        import cloudscraper

        url = "https://ipplaybox.fun/dookeela/ch3hd/chunks.m3u8"

        headers = {
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
            "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8",
            "Accept-Language": "th-TH,th;q=0.9,en-US;q=0.8",
            "Referer": "https://ipplaybox.fun/",
            "Connection": "keep-alive"
        }

        try:
            # ใช้ cloudscraper แบบเปิด Session ต่อเนื่องเพื่อความเนียน
            scraper = cloudscraper.create_scraper(
                delay=10,
                browser={"browser": "chrome", "platform": "windows", "desktop": True}
            )
            response = scraper.get(url, headers=headers, timeout=20)
            
            raw_content = response.text
            
            # ตรวจสอบว่าได้ไฟล์สตรีมจริงไหม
            if response.status_code == 200 and "#EXTM3U" in raw_content:
                lines = raw_content.split("\n")
                new_lines = []
                base_url = "https://ipplaybox.fun/dookeela/ch3hd/"
                
                for line in lines:
                    t = line.strip()
                    if t and not t.startswith("#"):
                        if ".css" in t:
                            t = t.replace(".css", ".ts")
                        if not t.startswith("http"):
                            t = base_url + t
                    new_lines.append(t)
                    
                processed_content = "\n".join(new_lines)
            else:
                # [จุดสำคัญ] ถ้าพัง บังคับเซฟข้อความที่เซิร์ฟเวอร์ตอบกลับมาลงไฟล์ เพื่อให้เรากดดูได้ว่าติดอะไร
                processed_content = f"#ERROR_LOG\n#STATUS: {response.status_code}\n{raw_content}"
                
            with open("live.m3u8", "w", encoding="utf-8") as f:
                f.write(processed_content)
                
        except Exception as e:
            with open("live.m3u8", "w", encoding="utf-8") as f:
                f.write(f"#EXCEPTION_LOG\n{str(e)}")
        EOF

    - name: Run Fetch Script
      run: python fetch.py

    - name: Commit and Push if updated
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add live.m3u8
        git commit -m "Update live stream playlist" || exit 0
        git push
